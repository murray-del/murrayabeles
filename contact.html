    <main class="page-wrap">
        <header class="page-head">
            <div class="eyebrow"><span class="eyebrow-dot"></span>Say hello</div>
            <h1 class="page-h1">Get in <em>touch</em>.</h1>
        </header>

        <div class="contact-solo">
            <form id="contact-form" class="contact-form">
                <div class="form-field">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-field">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" required>
                </div>
                <div class="form-field">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <div id="form-error" class="form-error" style="display:none;">Something went wrong. Please try again.</div>
                <button type="submit" class="form-btn">Send note <span>→</span></button>
            </form>

            <div id="form-success" class="contact-form" style="display:none;">
                <p class="thankyou-msg">Your message has been received. I'll be in touch shortly.</p>
                <a href="index.html" class="form-btn">Return home <span>→</span></a>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-base">
            <span>© 2026 Murray Abeles</span>
            <span>All rights reserved.</span>
        </div>
    </footer>

    <script>
        const btn = document.querySelector('.nav-hamburger');
        const drawer = document.querySelector('.nav-drawer');
        btn.addEventListener('click', () => {
            const open = drawer.classList.toggle('open');
            btn.classList.toggle('open', open);
            btn.setAttribute('aria-expanded', String(open));
        });
        drawer.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
            drawer.classList.remove('open');
            btn.classList.remove('open');
            btn.setAttribute('aria-expanded', 'false');
        }));

        document.getElementById('contact-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const form = e.target;
            const btn = form.querySelector('button[type="submit"]');
            const error = document.getElementById('form-error');
            btn.disabled = true;
            btn.innerHTML = 'Sending… <span>→</span>';
            error.style.display = 'none';
            try {
                const res = await fetch('https://formspree.io/f/xrerjlab', {
                    method: 'POST',
                    headers: { 'Accept': 'application/json' },
                    body: new FormData(form)
                });
                if (res.ok) {
                    form.style.display = 'none';
                    document.getElementById('form-success').style.display = 'flex';
                } else {
                    throw new Error();
                }
            } catch {
                error.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Send note <span>→</span>';
            }
        });
    </script>

</body>
